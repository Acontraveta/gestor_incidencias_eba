<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#D13B2E">
  <title>EBA - Gestor de incidencias</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="app-header no-print">
    <div class="header-left">
      <div class="header-logo">EBA</div>
      <div>
        <div class="header-title">Gestor de incidencias</div>
        <div class="header-sub">Departamento de producto</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="sync-indicator" onclick="manualSync()" title="Sincronizar" style="display:none"><svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0020 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 004 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg></button>
      <button class="header-btn" onclick="openGlobalSearch()" title="Buscar"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
      <button class="header-btn" onclick="toggleTheme()" title="Modo oscuro"><svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg></button>
    </div>
  </header>
  <div id="current-proc-bar" class="current-proc-bar" style="display:none">
    <span id="current-proc-name"></span>
    <button onclick="selectProcess(null)" style="width:auto;flex:0 0 auto;font-size:11px;padding:4px 12px;background:transparent;color:var(--eba-dark);border:1px solid rgba(168,43,32,0.2);">&#10005; Cerrar</button>
  </div>
  <div class="tabs no-print">
    <button class="tab active" data-tab="procesos"><svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>Proyectos</button>
    <button class="tab" data-tab="registro" disabled><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Nueva</button>
    <button class="tab" data-tab="listado"><svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>Listado</button>
    <button class="tab" data-tab="informe"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>Informe</button>
    <button class="tab" data-tab="datos"><svg viewBox="0 0 24 24"><path d="M19.35 10.04A7.49 7.49 0 0012 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 000 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>Datos</button>
  </div>
  <!-- TAB PROYECTOS -->
  <div id="tab-procesos" class="tab-panel">
    <div id="dashboard" class="dashboard"></div>
    <div class="card">
      <div class="collapsible-toggle" onclick="toggleCollapsible('new-proc-body', this)">
        <h2>Nuevo proyecto</h2>
        <span class="collapsible-arrow">&#9662;</span>
      </div>
      <div id="new-proc-body" class="collapsible-body">
        <div class="form-row">
          <div class="form-group"><label for="new-proc-code">Codigo / ref.</label><input id="new-proc-code" type="text" placeholder="ej: sabina ibiza f08" maxlength="50"></div>
          <div class="form-group"><label for="new-proc-name">Nombre *</label><input id="new-proc-name" type="text" placeholder="Nombre del proyecto" maxlength="200"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label for="new-proc-client">Cliente</label><input id="new-proc-client" type="text" placeholder="Nombre del cliente" maxlength="200"></div>
          <div class="form-group"><label for="new-proc-desc">Descripcion</label><input id="new-proc-desc" type="text" placeholder="Breve descripcion" maxlength="500"></div>
        </div>
        <button onclick="addProcess()">Crear proyecto</button>
      </div>
    </div>
    <div id="proc-list-container"></div>
  </div>
  <!-- TAB REGISTRO -->
  <div id="tab-registro" class="tab-panel" style="display:none">
    <div class="card">
      <h2>Nueva entrada</h2>
      <div class="form-row">
        <div class="form-group"><label for="f-fecha">Fecha</label><input id="f-fecha" type="date"></div>
        <div class="form-group"><label for="f-fase">Fase</label>
          <select id="f-fase"><option value="diseno">Diseno</option><option value="prototipo">Prototipo</option><option value="proveedores">Proveedores / compras</option><option value="materiales">Recepcion materiales</option><option value="fabricacion">Fabricacion</option><option value="acabados">Acabados</option><option value="calidad">Control calidad</option><option value="embalaje">Embalaje</option><option value="logistica">Logistica / envio</option><option value="instalacion">Instalacion / montaje</option><option value="postventa">Postventa</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label for="f-tipo">Tipo</label><select id="f-tipo"><option value="incidencia">Incidencia</option><option value="observacion">Observacion</option><option value="mejora">Mejora</option></select></div>
        <div class="form-group"><label for="f-sev">Severidad</label><select id="f-sev"><option value="baja">Baja</option><option value="media" selected>Media</option><option value="alta">Alta</option></select></div>
        <div class="form-group"><label for="f-estado">Estado</label><select id="f-estado"><option value="abierta" selected>Abierta</option><option value="progreso">En progreso</option><option value="resuelta">Resuelta</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label for="f-resp">Responsable</label><input id="f-resp" type="text" placeholder="Persona responsable" maxlength="100"></div>
        <div class="form-group"><label for="f-prov">Proveedor</label><input id="f-prov" type="text" placeholder="Proveedor implicado" maxlength="200"></div>
        <div class="form-group"><label for="f-ref">Referencia / lote</label><input id="f-ref" type="text" placeholder="Ref. material o lote" maxlength="100"></div>
      </div>
      <div class="form-group"><label for="f-desc">Descripcion *</label><textarea id="f-desc" rows="3" placeholder="Describe la incidencia, observacion o mejora..." maxlength="5000"></textarea></div>
      <div class="form-group"><label for="f-accion">Accion tomada / propuesta</label><textarea id="f-accion" rows="2" placeholder="Accion realizada o sugerida..." maxlength="5000"></textarea></div>
      <div class="form-group">
        <label>Adjuntos</label>
        <div class="form-row" style="gap:8px;">
          <input id="f-files" type="file" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.csv,.dwg,.zip">
          <label class="camera-btn" for="f-camera">&#128247; Camara</label>
          <input id="f-camera" type="file" accept="image/*" capture="environment" style="display:none">
        </div>
        <div id="f-attachments" class="attachments"></div>
      </div>
      <div class="form-row" style="gap:8px;">
        <button onclick="addEntry()">Guardar entrada</button>
        <button onclick="clearForm()" style="background:var(--surface-hover);color:var(--muted);">Limpiar</button>
      </div>
    </div>
  </div>
  <!-- TAB LISTADO -->
  <div id="tab-listado" class="tab-panel" style="display:none">
    <div class="card no-print">
      <div class="collapsible-toggle" onclick="toggleCollapsible('filter-body', this)">
        <h2>Filtros <span id="filter-count" class="filter-active-count" style="display:none"></span></h2>
        <span class="collapsible-arrow open">&#9662;</span>
      </div>
      <div id="filter-body" class="collapsible-body open">
        <div class="filter-group">
          <select id="filt-proc"><option value="">Todos los proyectos</option></select>
          <select id="filt-fase"><option value="">Todas las fases</option><option value="diseno">Diseno</option><option value="prototipo">Prototipo</option><option value="proveedores">Proveedores / compras</option><option value="materiales">Recepcion materiales</option><option value="fabricacion">Fabricacion</option><option value="acabados">Acabados</option><option value="calidad">Control calidad</option><option value="embalaje">Embalaje</option><option value="logistica">Logistica / envio</option><option value="instalacion">Instalacion / montaje</option><option value="postventa">Postventa</option></select>
          <select id="filt-tipo"><option value="">Todos los tipos</option><option value="incidencia">Incidencia</option><option value="observacion">Observacion</option><option value="mejora">Mejora</option></select>
          <select id="filt-sev"><option value="">Todas las severidades</option><option value="baja">Baja</option><option value="media">Media</option><option value="alta">Alta</option></select>
          <select id="filt-estado"><option value="">Todos los estados</option><option value="abierta">Abierta</option><option value="progreso">En progreso</option><option value="resuelta">Resuelta</option></select>
          <input id="filt-text" type="search" placeholder="Buscar texto libre...">
        </div>
      </div>
    </div>
    <div class="sort-bar no-print">
      <span>Ordenar:</span>
      <button class="sort-btn active" data-sort="fecha" onclick="setSort('fecha')">Fecha</button>
      <button class="sort-btn" data-sort="sev" onclick="setSort('sev')">Severidad</button>
      <button class="sort-btn" data-sort="estado" onclick="setSort('estado')">Estado</button>
    </div>
    <div id="entries-list"></div>
  </div>
  <!-- TAB INFORME -->
  <div id="tab-informe" class="tab-panel" style="display:none">
    <div class="card no-print">
      <h2>Generar informe</h2>
      <div class="filter-group">
        <div class="form-group" style="flex:1;min-width:160px;"><label for="rep-proc">Proyecto</label><select id="rep-proc"><option value="">Todos los proyectos</option></select></div>
        <div class="form-group" style="flex:1;min-width:120px;"><label for="rep-desde">Desde</label><input id="rep-desde" type="date"></div>
        <div class="form-group" style="flex:1;min-width:120px;"><label for="rep-hasta">Hasta</label><input id="rep-hasta" type="date"></div>
        <div class="form-group" style="flex:1;min-width:140px;"><label for="rep-fase">Fase</label>
          <select id="rep-fase"><option value="">Todas</option><option value="diseno">Diseno</option><option value="prototipo">Prototipo</option><option value="proveedores">Proveedores / compras</option><option value="materiales">Recepcion materiales</option><option value="fabricacion">Fabricacion</option><option value="acabados">Acabados</option><option value="calidad">Control calidad</option><option value="embalaje">Embalaje</option><option value="logistica">Logistica / envio</option><option value="instalacion">Instalacion / montaje</option><option value="postventa">Postventa</option></select>
        </div>
        <div class="form-group" style="flex:1;min-width:120px;"><label for="rep-att">Adjuntos</label><select id="rep-att"><option value="si">Incluir</option><option value="no">Excluir</option></select></div>
      </div>
      <div class="form-row" style="gap:8px;">
        <button onclick="generateReport()">Generar informe</button>
        <button onclick="window.print()" style="background:var(--surface-hover);color:var(--muted);">Imprimir / PDF</button>
      </div>
    </div>
    <div id="report-output"></div>
  </div>
  <!-- TAB DATOS -->
  <div id="tab-datos" class="tab-panel" style="display:none">
    <div class="card">
      <h2>Sincronizacion</h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px;">Comparte datos entre dispositivos.</p>
      <div class="form-group"><label for="sync-backend">Backend</label>
        <select id="sync-backend" onchange="toggleSyncConfig()"><option value="">Desactivado</option><option value="github">GitHub (Gist privado)</option><option value="server">Servidor propio</option></select>
      </div>
      <div id="sync-github-config" style="display:none">
        <div class="form-group"><label for="sync-token">Token de acceso (GitHub)</label><input id="sync-token" type="password" placeholder="ghp_xxxxxxxxxxxx" maxlength="200"></div>
        <div class="form-group"><label for="sync-gist-id">Gist ID (se crea solo)</label><input id="sync-gist-id" type="text" placeholder="Se creara automaticamente" maxlength="100" readonly></div>
        <button onclick="saveSyncConfig()">Guardar y sincronizar</button>
        <div class="form-row" style="gap:8px;margin-top:8px;">
          <button onclick="manualPull()" style="background:var(--surface-hover);color:var(--ink);">Descargar</button>
          <button onclick="manualPush()" style="background:var(--surface-hover);color:var(--ink);">Subir</button>
        </div>
      </div>
      <div id="sync-server-config" style="display:none">
        <div class="form-group"><label for="sync-server-url">URL del servidor</label><input id="sync-server-url" type="url" placeholder="https://servidor.empresa.com/api" maxlength="500"></div>
        <div class="form-group"><label for="sync-server-token">Token</label><input id="sync-server-token" type="password" placeholder="Token de acceso" maxlength="200"></div>
        <button onclick="saveSyncConfig()">Guardar y sincronizar</button>
      </div>
      <div id="sync-status" style="margin-top:10px;font-size:12px;color:var(--hint);"></div>
    </div>
    <div class="card">
      <h2>Copias de seguridad</h2>
      <p style="font-size:13px;color:var(--muted);margin-bottom:12px;">Exporta o importa datos manualmente.</p>
      <div class="form-row" style="gap:8px;">
        <button onclick="exportJSON()">Exportar JSON</button>
        <button onclick="exportCSV()" style="background:var(--surface-hover);color:var(--ink);">Exportar CSV</button>
      </div>
      <div class="form-group" style="margin-top:12px;"><label for="import-file">Importar copia</label><input id="import-file" type="file" accept=".json" onchange="importJSON(event)"></div>
      <hr style="border:none;border-top:1px solid var(--border);margin:20px 0;">
      <button class="danger" onclick="wipeAll()">Borrar todos los datos</button>
    </div>
  </div>
  <!-- FAB -->
  <button id="fab" class="fab hidden no-print" onclick="switchTab('registro')" title="Nueva entrada">+</button>
  <!-- GLOBAL SEARCH -->
  <div id="global-search-wrap" class="global-search-wrap" onclick="if(event.target===this)closeGlobalSearch()">
    <div class="global-search-box">
      <input id="global-search-input" type="text" placeholder="Buscar en todas las entradas..." oninput="performGlobalSearch(this.value)">
      <div id="global-search-results" class="global-search-results"></div>
    </div>
  </div>
  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src="" alt="Vista ampliada"></div>
  <!-- EDIT OVERLAY -->
  <div id="edit-overlay" class="edit-overlay">
    <div class="edit-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <h2 style="margin:0;">Editar entrada</h2>
        <button onclick="closeEditEntry()" style="width:auto;background:transparent;color:var(--hint);font-size:20px;padding:4px 10px;min-height:auto;border:none;">&#10005;</button>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Fecha</label><input id="edit-fecha" type="date"></div>
        <div class="form-group"><label>Fase</label>
          <select id="edit-fase"><option value="diseno">Diseno</option><option value="prototipo">Prototipo</option><option value="proveedores">Proveedores / compras</option><option value="materiales">Recepcion materiales</option><option value="fabricacion">Fabricacion</option><option value="acabados">Acabados</option><option value="calidad">Control calidad</option><option value="embalaje">Embalaje</option><option value="logistica">Logistica / envio</option><option value="instalacion">Instalacion / montaje</option><option value="postventa">Postventa</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Tipo</label><select id="edit-tipo"><option value="incidencia">Incidencia</option><option value="observacion">Observacion</option><option value="mejora">Mejora</option></select></div>
        <div class="form-group"><label>Severidad</label><select id="edit-sev"><option value="baja">Baja</option><option value="media">Media</option><option value="alta">Alta</option></select></div>
        <div class="form-group"><label>Estado</label><select id="edit-estado"><option value="abierta">Abierta</option><option value="progreso">En progreso</option><option value="resuelta">Resuelta</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Responsable</label><input id="edit-resp" type="text" maxlength="100"></div>
        <div class="form-group"><label>Proveedor</label><input id="edit-prov" type="text" maxlength="200"></div>
        <div class="form-group"><label>Ref / lote</label><input id="edit-ref" type="text" maxlength="100"></div>
      </div>
      <div class="form-group"><label>Descripcion *</label><textarea id="edit-desc" rows="3" maxlength="5000"></textarea></div>
      <div class="form-group"><label>Accion</label><textarea id="edit-accion" rows="2" maxlength="5000"></textarea></div>
      <div class="form-row" style="gap:8px;">
        <button onclick="saveEditEntry()">Guardar cambios</button>
        <button onclick="closeEditEntry()" style="background:var(--surface-hover);color:var(--muted);">Cancelar</button>
      </div>
    </div>
  </div>
  <div id="app-toast" class="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
